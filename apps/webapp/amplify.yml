version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - npm install -g pnpm
            - pnpm install
        build:
          commands:
            - env | grep -e DATABASE_URL >> .env.production
            - env | grep -e TOKEN_KEY >> .env.production

            - npx turbo run build --filter=@apps/webapp
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/webapp
